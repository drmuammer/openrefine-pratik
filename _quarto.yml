          - bolumler/06-tarih.qmd
          - bolumler/07-email-ve-yinelenenler.qmd
          - bolumler/08-bitiris.qmd
    right:
      - icon: github
        href: https://github.com/drmuammer/openrefine-pratik
        aria-label: GitHub
      - icon: house
        href: https://muammerbeslen.com
        aria-label: Website

  sidebar:
    style: "docked"
