project:
  type: website
  output-dir: _site

website:
  title: "OpenRefine Eğitimi"
  description: "Adım adım, panik yapmadan kirli veri temizleme rehberi"
  site-url: https://drmuammer.github.io/openrefine-pratik/
  repo-url: https://github.com/drmuammer/openrefine-pratik
  repo-actions: [edit, issue]
  page-navigation: true
  back-to-top-navigation: true

  navbar:
    background: "#0F172A"
    foreground: "#14B8A6"
    title: "🧹 OpenRefine Eğitimi"
