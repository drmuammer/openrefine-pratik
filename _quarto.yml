format:
  html:
    theme:
      light: cosmo
      dark: darkly
    css: styles.css
    toc: true
    toc-depth: 3
    toc-location: right
    toc-title: "Bu Sayfada"
    code-copy: true
    code-overflow: wrap
    smooth-scroll: true
    link-external-newwindow: true
    anchor-sections: true
    fig-cap-location: bottom
    tbl-cap-location: top
    highlight-style: github

lang: tr
